<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <!-- 1. The main redirect link (0 means zero seconds delay) -->
    <meta http-equiv="refresh" content="0; url=https://www.example.com">
    
    <!-- 2. A JavaScript backup in case the meta tag is blocked -->
    <script>
        window.location.href = "https://sites.fastspring.com/pixeleggsoftware/product/milestone";
    </script>
</head>
<body>
    <!-- 3. Fallback text for the user just in case both fail -->
    <p>If you are not redirected automatically, follow this <a href="https://www.example.com">link to the new destination</a>.</p>
</body>
</html>
